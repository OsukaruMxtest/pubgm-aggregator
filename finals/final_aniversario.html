    <style>

            --mvt-damage-top: 77.5%;
            --mvt-damage-left: 16.5%;
            --mvt-stats-font-size: 152px;
            --mvt-radar-top: 58%;
            --mvt-radar-left: 78%;

            --mvt-weapon-left: 20%;

        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400    ;700&display=swap');

        body {

            width: 1920px;
            height: 1080px;

            opacity: 0;

        .alert-layer {

            0% { transform: translateY(0) scale(1); opacity: 0.4; }

            100% { transform: translateY(0) scale(1); opacity: 0.4; }

    <script>
        // ========================================================================
        // ARQUITECTURA: OVERLAY ESCLAVO (NO es snapshot leader)
        // ========================================================================
        window.IS_SNAPSHOT_LEADER = false;

        // ========================================================================
        // CONFIGURACIÓN DE ENDPOINTS (solo se usan si fuera leader, pero se dejan)
        // ========================================================================
        const SNAPSHOT_ENDPOINTS = [
            "https://pubgm-aggregator-production.up.railway.app/getmatchsnapshot",       // aggregator principal
            "http://localhost:10086/getmatchsnapshot"       // fallback observer
        ];

        // Derivamos las bases para armas quitando "/getmatchsnapshot" del final
        const WEAPON_BASE_ENDPOINTS = SNAPSHOT_ENDPOINTS.map(url => url.replace(/\/getmatchsnapshot$/, ''));

        const WEAPON_PATH = "/getplayerweapondetailinfo";

        const NETWORK_TIMEOUT = 2000;
        const MAX_RETRY_PER_ENDPOINT = 2;

        // Índices activos para cada tipo de endpoint
        let _activeSnapshotIndex = 0;
        let _activeWeaponIndex = 0;

        // Variables globales para el snapshot (se actualizan vía Broadcast)
        let CURRENT_SNAPSHOT = null;
        let LAST_GOOD_SNAPSHOT = null;
        let FETCH_IN_PROGRESS = false;
        let CURRENT_OBSERVER_INDEX = 0;

        // Último gameId procesado para evitar duplicados
        let lastProcessedGameId = null;
        // Último gameId del snapshot (se mantiene por compatibilidad)
        let lastSnapshotGameId = null;

        // Flag para evitar doble ejecución de la secuencia final
        let finalSequenceStarted = false;

        // Flag para evitar la secuencia automática en el primer snapshot
        let snapshotInitialized = false;

        // Temporizadores y control de secuencia (AHORA USAMOS ARRAY)
        let sequenceTimeouts = [];
        let currentLayer = null;

        // Datos de jugadores para las funciones existentes
        let lastPlayerStats = [];

        // Mapa de nombres de armas
        const WEAPON_NAMES = {
            101001: 'AKM', 101002: 'M16A4', 101003: 'SCAR-L', 101004: 'M416', 101005: 'Groza', 101006: 'AUG A3',
            101007: 'QBZ', 101008: 'M762', 101009: 'Mk47 Mutant', 101010: 'G36C', 101100: 'FAMAS', 101012: 'Honey Badger',
            102001: 'UZI', 102002: 'UMP45', 102003: 'Vector', 102004: 'Thompson SMG', 102005: 'PP19', 102007: 'MP5K',
            102105: 'P90', 103001: 'Kar98K', 103002: 'M24', 103003: 'AWM', 103004: 'SKS', 103005: 'VSS', 103006: 'Mini14',
            103007: 'Mk14', 103008: 'Win94', 103009: 'SLR', 103010: 'QBU', 103011: 'Mosin Nagant', 103012: 'AMR',
            103100: 'MK12', 104001: 'S686', 104002: 'S1897', 104003: 'S12K', 104004: 'DBS', 104101: 'M1014',
            104102: 'NS2000', 105001: 'M249', 105002: 'DP-28', 105010: 'MG3', 106001: 'P92', 106002: 'P1911',
            106003: 'R1895', 106004: 'P18C', 106005: 'R45', 106006: 'Sawed-off', 106007: 'Flare gun', 106008: 'Skorpion',
            106010: 'Desert Eagle', 107001: 'Crossbow', 107007: 'Tactical Crossbow'
        };

        // ========================================================================
        // NUEVAS FUNCIONES PARA GESTIÓN DE TIMEOUTS EN SECUENCIA
        // ========================================================================
        function addSequenceTimeout(callback, delay) {
            const id = setTimeout(() => {
                // Eliminar de la lista al ejecutarse
                sequenceTimeouts = sequenceTimeouts.filter(t => t !== id);
                callback();
            }, delay);
            sequenceTimeouts.push(id);
            return id;
        }

        function clearSequenceTimeouts() {
            sequenceTimeouts.forEach(id => clearTimeout(id));
            sequenceTimeouts = [];
        }

        // ========================================================================
        // FUNCIONES DE RED CON FALLBACK (solo para arma, pues snapshot llega por broadcast)
        // ========================================================================

        // Para obtener datos de armas (usa WEAPON_BASE_ENDPOINTS)
        async function fetchWeaponWithFallback(uid) {
            const endpoints = WEAPON_BASE_ENDPOINTS;
            const totalEndpoints = endpoints.length;
            const path = `${WEAPON_PATH}?uid=${encodeURIComponent(uid)}`;

            for (let i = 0; i < totalEndpoints; i++) {
                const idx = (_activeWeaponIndex + i) % totalEndpoints;
                const base = endpoints[idx];
                const url = base + path;

                for (let attempt = 1; attempt <= MAX_RETRY_PER_ENDPOINT; attempt++) {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), NETWORK_TIMEOUT);

                    try {
                        const response = await fetch(url, { signal: controller.signal });
                        clearTimeout(timeoutId);

                        if (!response.ok) throw new Error(`HTTP ${response.status}`);

                        const data = await response.json();

                        if (idx !== _activeWeaponIndex) {
                            console.debug(`[OVERLAY] Weapon failover → ${base}`);
                            _activeWeaponIndex = idx;
                        }

                        return data;

                    } catch (err) {
                        clearTimeout(timeoutId);
                        const reason = err.name === 'AbortError' ? 'timeout' : err.message;
                        console.debug(`[OVERLAY] Weapon error (${base}, attempt ${attempt}): ${reason}`);
                    }
                }
            }

            console.error('[OVERLAY] Todos los endpoints de armas fallaron');
            return null;
        }

        async function fetchWeaponData(uid) {
            return await fetchWeaponWithFallback(uid);
        }

        // ========================================================================
        // FUNCIONES DE AYUDA (sin cambios)
        // ========================================================================
        function animateNumber(element, start, end, duration) {
            const startTime = Date.now();
            const step = () => {
                const currentTime = Date.now();
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const currentValue = Math.floor(start + (end - start) * progress);
                element.textContent = currentValue;
                if (progress < 1) requestAnimationFrame(step);
                else element.textContent = end;
            };
            requestAnimationFrame(step);
        }

        function formatTeamId(teamId) {
            if (!teamId || teamId === '') return '000';
            const id = parseInt(teamId, 10) || 0;
            return id.toString().padStart(3, '0');
        }

        function scaleTextToFit(element, maxWidth) {
            if (!element || !element.parentElement) return;
            element.style.transform = 'scale(1)';
            const textWidth = element.scrollWidth;
            const containerWidth = maxWidth || (element.parentElement.clientWidth - 32);
            if (textWidth > containerWidth) {
                const scale = containerWidth / textWidth;
                element.style.transform = `scale(${scale})`;
                element.style.transformOrigin = 'left center';
            } else {
                element.style.transform = 'scale(1)';
            }
        }

        // NUEVA TABLA DE PUNTOS POR POSICIÓN
        function getPositionPoints(rank) {
            if (rank === 1)  return 20;
            if (rank === 2)  return 18;
            if (rank === 3)  return 16;
            if (rank === 4)  return 14;
            if (rank === 5)  return 12;
            if (rank === 6)  return 10;
            if (rank === 7)  return 8;
            if (rank === 8)  return 6;
            if (rank === 9)  return 5;
            if (rank === 10) return 4;
            return 0;
        }

        // ========================================================================
        // AGRUPACIÓN POR EQUIPO
        // ========================================================================
        function groupByTeam(players) {
            const teamsMap = new Map();
            players.forEach(p => {
                if (!p.teamId) return;
                const teamId = p.teamId;
                if (!teamsMap.has(teamId)) {
                    teamsMap.set(teamId, {
                        teamId: teamId,
                        teamName: p.teamName || `Equipo ${teamId}`,
                        players: [],
                        totalKills: 0,
                        totalDamage: 0,
                        bestRank: p.rank || 999,
                        pp: 0,
                        pe: 0,
                        totalPoints: 0,
                        wwcd: false
                    });
                }
                const team = teamsMap.get(teamId);
                team.players.push(p);
                team.totalKills += p.killNum || 0;
                team.totalDamage += p.damage || 0;
                if ((p.rank || 999) < team.bestRank) team.bestRank = p.rank || 999;
            });
            teamsMap.forEach(team => {
                const rank = team.bestRank;
                team.pp = getPositionPoints(rank);
                team.pe = team.totalKills;  // winner/MVP/MVT usan kills×1
                team.totalPoints = team.pp + team.pe;
                team.wwcd = (rank === 1);
            });
            return Array.from(teamsMap.values());
        }

        // ========================================================================
        // CÁLCULO DE ESTADÍSTICAS POR EQUIPO CON BONUS (PARA TABLA DE PARTIDA)
        // ========================================================================
        function computeTeamStatsWithBonuses(players, killinfo) {
            const teamsMap = new Map();
            
            // Primera pasada: recopilar datos básicos y bonus de granada/vehículo
            players.forEach(p => {
                if (!p.teamId) return;
                const teamId = p.teamId;
                if (!teamsMap.has(teamId)) {
                    teamsMap.set(teamId, {
                        teamId: teamId,
                        teamName: p.teamName || `Equipo ${teamId}`,
                        players: [],
                        totalKills: 0,
                        totalDamage: 0,
                        bestRank: p.rank || 999,
                        pp: 0,
                        pe: 0,
                        totalPoints: 0,
                        wwcd: false,
                        grenadeKills: 0,
                        vehicleKills: 0,
                        molotovKills: 0,
                        // PROPIEDADES PARA BONUS
                        bonus: 0,
                        meleeKills: 0
                    });
                }
                const team = teamsMap.get(teamId);
                team.players.push(p);
                team.totalKills += p.killNum || 0;
                team.totalDamage += p.damage || 0;
                team.grenadeKills += Number(p.killNumByGrenade ?? p.KillNumByGrenade ?? 0);
                team.vehicleKills += Number(p.killNumInVehicle ?? p.KillNumInVehicle ?? 0);
                
                // BONUS por granadas y vehículos (se acumulan ahora)
                team.bonus += (Number(p.killNumByGrenade ?? 0) * 3);
                team.bonus += (Number(p.killNumInVehicle ?? 0) * 8);
                
                if ((p.rank || 999) < team.bestRank) team.bestRank = p.rank || 999;
            });

            const uidToTeam = new Map();
            players.forEach(p => {
                if (p.uId) uidToTeam.set(String(p.uId), p.teamId);
            });

            // Segunda pasada: analizar killinfo para melee y molotov
            if (killinfo && Array.isArray(killinfo)) {
                killinfo.forEach(kill => {
                    const causerId = kill.CauserUID;
                    if (!causerId) return;
                    const teamId = uidToTeam.get(String(causerId));
                    if (!teamId || !teamsMap.has(teamId)) return;

                    const team = teamsMap.get(teamId);
                    const itemId = Number(kill.ItemID);
                    
                    // MELEE (108xxx)
                    if (itemId >= 108000 && itemId < 109000) {
                        team.meleeKills++;
                        team.bonus += 13;
                    }
                    
                    // MOLOTOV (602003 con ResultHealthStatus 2)
                    if (itemId === 602003 && Number(kill.ResultHealthStatus) === 2) {
                        team.molotovKills++;
                        team.bonus += 3;
                    }
                });
            }

            // Calcular puntos finales
            teamsMap.forEach(team => {
                const rank = team.bestRank;
                team.pp = getPositionPoints(rank);
                // Puntos por eliminaciones: cada kill vale 2
                team.pe = team.totalKills * 2;
                team.totalPoints = team.pp + team.pe + team.bonus;
                team.wwcd = (rank === 1);
                
                // Para depuración (se puede eliminar después)
                console.log("TEAM DEBUG:", team);
            });

            return Array.from(teamsMap.values());
        }

        // ========================================================================
        // DIBUJO DE RADAR CHART
        // ========================================================================
        function drawRadarChart(canvasId, stats) {
            const canvas = document.getElementById(canvasId);
            if (!canvas || !stats) return;

            if (Object.keys(stats).length > 0) {
                canvas.style.opacity = 1;
            } else {
                canvas.style.opacity = 0;
                return;
            }

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 80;

            const statLabels = ['Tiros', 'Impactos', 'Precisión', 'Cabeza', 'Cuerpo', 'Manos', 'Pies', 'Extremidades'];
            const statKeys = ['TotalShots', 'TotalHits', 'Accuracy', 'HeadHits', 'BodyHits', 'HandHits', 'FootHits', 'LimbsHits'];

            const maxValues = {};
            statKeys.forEach(key => {
                const value = stats[key] || 0;
                maxValues[key] = value + 50;
            });

            const normalizedValues = statKeys.map(key => {
                const value = stats[key] || 0;
                const max = maxValues[key];
                return Math.min(value / max, 1);
            });

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1.5;
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, (radius / 4) * i, 0, 2 * Math.PI);
                ctx.stroke();
            }

            const angleStep = (2 * Math.PI) / statLabels.length;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.5;

            statLabels.forEach((label, i) => {
                const angle = angleStep * i - Math.PI / 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            ctx.fillStyle = 'rgba(188, 94, 251, 0.45)';
            ctx.strokeStyle = 'var(--accent-2)';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'var(--accent-2)';
            ctx.shadowBlur = 15;

            ctx.beginPath();
            normalizedValues.forEach((value, i) => {
                const angle = angleStep * i - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (value * radius);
                const y = centerY + Math.sin(angle) * (value * radius);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.shadowBlur = 0;
            normalizedValues.forEach((value, i) => {
                const angle = angleStep * i - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (value * radius);
                const y = centerY + Math.sin(angle) * (value * radius);

                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2 * Math.PI);
                ctx.fill();

                const actualValue = stats[statKeys[i]];
                const valueText = statKeys[i] === 'Accuracy' ? actualValue.toFixed(1) + '%' : Math.floor(actualValue).toString();

                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Roboto';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const textX = centerX + Math.cos(angle) * (value * radius + 30);
                const textY = centerY + Math.sin(angle) * (value * radius + 30);

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.lineWidth = 4;
                ctx.strokeText(valueText, textX, textY);
                ctx.fillStyle = 'white';
                ctx.fillText(valueText, textX, textY);
                ctx.fillStyle = 'white';
            });

            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px Roboto';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            statLabels.forEach((label, i) => {
                const angle = angleStep * i - Math.PI / 2;
                const labelX = centerX + Math.cos(angle) * (radius + 35);
                const labelY = centerY + Math.sin(angle) * (radius + 35);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.lineWidth = 4;
                ctx.strokeText(label, labelX, labelY);
                ctx.fillStyle = 'white';
                ctx.fillText(label, labelX, labelY);
            });
        }

        // ========================================================================
        // PROCESAMIENTO DE ARMAS (para MVP y MVT)
        // ========================================================================
        function processWeaponData(weaponData, targetCanvasId, targetInfoId, isTeam = false, teamKillCount = null) {
            if (!weaponData || !weaponData.length) {
                drawRadarChart(targetCanvasId, {});
                document.getElementById(targetInfoId).style.opacity = 0;
                return;
            }

            const totals = {
                TotalShots: 0,
                TotalHits: 0,
                HeadHits: 0,
                BodyHits: 0,
                HandHits: 0,
                FootHits: 0,
                LimbsHits: 0
            };

            let weaponKillMap = new Map();

            weaponData.forEach(weapon => {
                totals.TotalShots += weapon.FireCount || 0;
                totals.TotalHits += weapon.UniqueHitCount || 0;
                totals.HeadHits += weapon.HeadShootCount || 0;
                totals.BodyHits += weapon.BodyShootCount || 0;
                totals.HandHits += weapon.HandShootCount || 0;
                totals.FootHits += weapon.FootShootCount || 0;
                totals.LimbsHits += weapon.LimbsShootCount || 0;

                const weaponName = WEAPON_NAMES[weapon.WeaponId];
                if (weaponName) {
                    const kills = weapon.KillCount || 0;
                    weaponKillMap.set(weaponName, (weaponKillMap.get(weaponName) || 0) + kills);
                }
            });

            totals.Accuracy = totals.TotalShots > 0 ? (totals.TotalHits / totals.TotalShots) * 100 : 0;

            drawRadarChart(targetCanvasId, totals);

            let favoriteWeapon = null;
            let maxKills = 0;
            for (let [name, kills] of weaponKillMap.entries()) {
                if (kills > maxKills) {
                    maxKills = kills;
                    favoriteWeapon = name;
                }
            }

            if (favoriteWeapon) {
                const prefix = isTeam ? 'ARMA FAVORITA DEL EQUIPO' : 'ARMA FAVORITA';
                const infoText = `${prefix}: ${favoriteWeapon}\n${maxKills} ELIMINACIONES`;
                document.getElementById(targetInfoId).textContent = infoText;
                document.getElementById(targetInfoId).style.opacity = 1;
            } else {
                document.getElementById(targetInfoId).style.opacity = 0;
            }

            setTimeout(() => {
                document.getElementById(targetCanvasId).style.opacity = 1;
            }, 200);
        }

                if (b.wwcd !== a.wwcd) return (b.wwcd ? 1 : 0) - (a.wwcd ? 1 : 0);
                if (b.pp !== a.pp) return b.pp - a.pp;
                if (b.pe !== a.pe) return b.pe - a.pe;
                return a.bestRank - b.bestRank;
            });

        // ========================================================================
        // DETECCIÓN DE FIN DE PARTIDA EN EL SNAPSHOT
        // ========================================================================
        function checkMatchEnd(snapshot) {
            if (!snapshot) return;

            const FinishedStartTime =
                Number(snapshot.FinishedStartTime || snapshot.allinfo?.FinishedStartTime || 0);

            const GameID =
                snapshot.GameID || snapshot.allinfo?.GameID;

            if (!GameID) return;

            const playersList = snapshot.allinfo?.TotalPlayerList || [];
            const alivePlayers = playersList.filter(p => p.liveState === 0).length;

            const players = rebuildPlayersFromSnapshot(snapshot.allinfo) || [];

            console.log('[MATCH CHECK]', {
                FinishedStartTime,
                players: playersList.length,
                alive: alivePlayers,
                GameID
            });

            if (
                FinishedStartTime > 0 &&
                GameID !== lastProcessedGameId
            ) {
                if (finalSequenceStarted) return;
                finalSequenceStarted = true;

                lastProcessedGameId = GameID;

                console.log("[MATCH END DETECTED]", GameID);

                if (!players.length) {
                    rebuildPlayersFromCurrentSnapshot();
                }

                startFinalSequence(players.length ? players : lastPlayerStats);
            }
        }

        // ========================================================================
        // LOOP DE SNAPSHOT (solo si es leader, pero aquí nunca se ejecuta)
        // ========================================================================
        async function updateSnapshotLoop() {
            // Solo ejecutar si este overlay es el snapshot leader
            if (!window.IS_SNAPSHOT_LEADER) return;

            const data = await fetchSnapshotWithFallback();
            if (data && data.allinfo) {
                CURRENT_SNAPSHOT = data;
                LAST_GOOD_SNAPSHOT = data;

                // Extraer jugadores siempre que haya datos
                const players = rebuildPlayersFromSnapshot(data.allinfo);
                
                if (players.length) {
                    lastPlayerStats = players;
                    console.debug("[PLAYERS] Actualizados:", lastPlayerStats.length);
                }

                const currentGameId = data.allinfo.GameID;
                if (currentGameId && currentGameId !== lastSnapshotGameId) {
                    lastSnapshotGameId = currentGameId;

                    // 🔥 RESET CRÍTICO al detectar nueva partida en modo leader
                    finalSequenceStarted = false;
                    lastProcessedGameId = null;
                    overlaySent = false;
                    lastGameIDForSheets = currentGameId;

                    console.log("[RESET PARTIDA] (leader mode)", currentGameId);
                }

                // Control de inicialización: solo ejecutar checkMatchEnd después del primer snapshot
                if (!snapshotInitialized) {
                    snapshotInitialized = true;
                    console.debug("[OVERLAY] Primer snapshot recibido, secuencia automática inhibida");
                } else {
                    checkMatchEnd(data);
                }
            }
            setTimeout(updateSnapshotLoop, 1000);
        }

        // ========================================================================
        // POLLING DE COMANDOS (solo si es leader, pero aquí nunca se ejecuta)
        // ========================================================================
        let lastCommandTimestamp = 0;

        async function fetchCommand() {
            // Solo ejecutar si este overlay es el snapshot leader
            if (!window.IS_SNAPSHOT_LEADER) return;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const response = await fetch('https://pubgm-aggregator-production.up.railway.app/overlaycommand', { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) return;
                const data = await response.json();
                if (data && data.cmd && data.timestamp && data.timestamp > lastCommandTimestamp) {
                    lastCommandTimestamp = data.timestamp;
                    console.debug("[OVERLAY CMD]", data.cmd);
                    handleCommand(data.cmd);
                }
            } catch (err) {
                // Ignorar errores de red
            }
            setTimeout(fetchCommand, 1000);
        }

        // ========================================================================
        // FUNCIÓN PARA RECONSTRUIR lastPlayerStats DESDE EL SNAPSHOT ACTUAL O ÚLTIMO VÁLIDO
        // Delega en rebuildPlayersFromSnapshot() definida en overlay_sync.js
        // ========================================================================
        function rebuildPlayersFromCurrentSnapshot() {
            const snapshot = CURRENT_SNAPSHOT || LAST_GOOD_SNAPSHOT;
            if (!snapshot) return;
            const players = rebuildPlayersFromSnapshot(snapshot.allinfo) || [];
            if (players && players.length) {
                lastPlayerStats = players;
                console.debug("[OVERLAY] Players rebuilt from snapshot:", players.length);
            }
        }

        // ========================================================================
        // NUEVA FUNCIÓN PARA ASEGURAR DATOS DE JUGADORES (con fallback a OverlayBroadcast)
        // ========================================================================
        async function ensurePlayerDataAsync() {
            if (lastPlayerStats.length > 0) return true;

            // Intentar con snapshot local
            rebuildPlayersFromCurrentSnapshot();
            if (lastPlayerStats.length > 0) return true;

            // Si no hay datos locales y existe OverlayBroadcast, pedir el snapshot actual
            if (window.OverlayBroadcast && typeof OverlayBroadcast.getCurrentSnapshot === 'function') {
                try {
                    const snapshot = OverlayBroadcast.getCurrentSnapshot();
                    if (snapshot && snapshot.allinfo) {
                        CURRENT_SNAPSHOT = snapshot;
                        LAST_GOOD_SNAPSHOT = snapshot;
                        const players = rebuildPlayersFromSnapshot(snapshot.allinfo) || [];
                        if (players.length) {
                            lastPlayerStats = players;
                            console.debug("[OVERLAY] Players obtenidos vía OverlayBroadcast");
                            return true;
                        }
                    }
                } catch (e) {
                    console.warn("[OVERLAY] Error al obtener snapshot de OverlayBroadcast", e);
                }
            }
            if (!lastPlayerStats.length) {
                console.warn("[OVERLAY] No se pudieron obtener players");
            }
            return false;
        }

        // ========================================================================
        async function handleCommand(command) {
            // Conjunto de comandos permitidos para este overlay
            const allowedCommands = new Set(['showWinner', 'showMVP', 'showMVT', 'showTablaPartida', 'hideAll']);
            if (!allowedCommands.has(command)) return;

            // Antes de ejecutar cualquier comando que muestre algo, cancelamos secuencias pendientes
            clearSequenceTimeouts();

            // Asegurar datos si se requiere (solo para comandos que muestran algo)
            if (command !== 'hideAll') {
                await ensurePlayerDataAsync();
            }

            console.log("[CMD RECEIVED]:", command);

            switch (command) {
                case 'showWinner':
                    if (lastPlayerStats.length) {
                        const teams = groupByTeam(lastPlayerStats);
                        showWinner(teams);
                    }
                    break;
                case 'showMVP':
                    await showMVP();
                    break;
                case 'showMVT':
                    await showMVT();
                    break;
                case 'showTablaPartida':
                    console.log("➡️ Ejecutando showClassification()");
                    showClassification();
                    break;
                case 'hideAll':
                    hideAllLayers();
                    break;
            }
        }

        // ========================================================================
        // LISTENER DE BROADCAST PARA SNAPSHOTS (canal pubgm_snapshot)
        // ========================================================================
        let snapshotChannel = null;
        try {
            snapshotChannel = new BroadcastChannel('pubgm_snapshot');
        } catch (e) {
            console.error('[final_aniversario] Error creando BroadcastChannel para snapshots', e);
        }

        if (snapshotChannel) {
            snapshotChannel.onmessage = (event) => {
                // Aceptar tanto el snapshot directo como un objeto envuelto { type: "snapshot", data: snapshot }
                const payload = event.data;
                const snapshot = payload?.data || payload; // si tiene .data, lo usa; si no, usa el payload directamente

                // Validación robusta: debe tener allinfo y TotalPlayerList como array
                if (
                    snapshot &&
                    snapshot.allinfo &&
                    Array.isArray(snapshot.allinfo.TotalPlayerList)
                ) {
                    CURRENT_SNAPSHOT = snapshot;
                    LAST_GOOD_SNAPSHOT = snapshot;

                    // Reconstruir jugadores con protección contra null
                    const players = rebuildPlayersFromSnapshot(snapshot.allinfo) || [];
                    if (players.length) {
                        lastPlayerStats = players;
                    }

                    if (window.DEBUG_OVERLAY) {
                        console.debug('[final_aniversario] Snapshot válido recibido vía Broadcast');
                    }

                    // ✅ HOTFIX CRÍTICO — Detección automática de fin de partida
                    // Detectar nueva partida y resetear flags
                    const newGameId = snapshot.allinfo?.GameID || snapshot.GameID;
                    if (newGameId && newGameId !== lastGameIDForSheets) {
                        overlaySent = false;
                        lastGameIDForSheets = newGameId;

                        // 🔥 RESET CRÍTICO al detectar nueva partida
                        finalSequenceStarted = false;
                        lastProcessedGameId = null;

                        console.log("[RESET PARTIDA]", newGameId);
                    }

                    // Activar detección de fin de partida automáticamente
                    // Inhibir primer snapshot para evitar disparo falso al cargar
                    if (!snapshotInitialized) {
                        snapshotInitialized = true;
                        console.debug('[final_aniversario] Primer snapshot (Broadcast) recibido, secuencia automática inhibida');
                    } else {
                        checkMatchEnd(snapshot);
                    }
                } else if (window.DEBUG_OVERLAY) {
                    console.debug('[final_aniversario] Snapshot inválido o incompleto ignorado');
                }
            };
        }

        // ========================================================================
        // NUEVO: LISTENER DE BROADCAST PARA COMANDOS (canal pubgm_commands)
        // ========================================================================
        let commandChannel = null;
        try {
            commandChannel = new BroadcastChannel('pubgm_commands');
        } catch (e) {
            console.error('[final_aniversario] Error creando BroadcastChannel para comandos', e);
        }

        if (commandChannel) {
            commandChannel.onmessage = (event) => {
                const data = event.data;
                // Aceptar tanto data.cmd como data.command (para compatibilidad con OverlaySync)
                const cmd = data?.cmd || data?.command;
                if (!cmd) return;
                if (window.DEBUG_OVERLAY) {
                    console.debug('[final_aniversario] Comando recibido vía Broadcast:', cmd);
                }
                handleCommand(cmd);
            };
        }

        // ========================================================================
        // INICIALIZACIÓN (evitar loops duplicados)
        // Solo hace polling si este overlay es el SNAPSHOT LEADER.
        // En la arquitectura Broadcast, el leader es barras_aniversario.html.
        // Los demás overlays reciben datos exclusivamente por BroadcastChannel.
        // ========================================================================
        window.addEventListener('load', () => {
            if (window.IS_SNAPSHOT_LEADER) {
                if (!window.__snapshotLoopStarted) {
                    window.__snapshotLoopStarted = true;
                    updateSnapshotLoop();
                }
                if (!window.__overlayCommandPollingStarted) {
                    window.__overlayCommandPollingStarted = true;
                    fetchCommand();
                }
            } else {
                console.debug('[final_aniversario] IS_SNAPSHOT_LEADER=false — escuchando BroadcastChannel + fallback directo');
            }

            // Fallback directo al aggregator — funciona aunque barras no esté emitiendo
            // Solo actúa cuando CURRENT_SNAPSHOT es null o cuando detecta FinishedStartTime
            if (!window.__directPollStarted) {
                window.__directPollStarted = true;
                const DIRECT_URLS = [
                    'http://localhost:3000/getmatchsnapshot',
                    'http://localhost:10086/getmatchsnapshot'
                ];
                let _lastDirectGameId = null;

                async function pollSnapshotDirect() {
                    for (const url of DIRECT_URLS) {
                        try {
                            const res = await fetch(url, { signal: AbortSignal.timeout(1500) });
                            if (!res.ok) continue;
                            const snap = await res.json();
                            if (!snap?.allinfo?.TotalPlayerList?.length) continue;

                            // Actualizar snapshot si no hay uno del broadcast
                            if (!CURRENT_SNAPSHOT) {
                                CURRENT_SNAPSHOT = snap;
                                LAST_GOOD_SNAPSHOT = snap;
                                const players = rebuildPlayersFromSnapshot(snap.allinfo) || [];
                                if (players.length) lastPlayerStats = players;
                            }

                            // Detectar nueva partida
                            const gid = snap.GameID || snap.allinfo?.GameID;
                            if (gid && gid !== _lastDirectGameId) {
                                _lastDirectGameId = gid;
                                if (gid !== lastGameIDForSheets) {
                                    overlaySent = false;
                                    lastGameIDForSheets = gid;
                                    finalSequenceStarted = false;
                                    lastProcessedGameId = null;
                                    snapshotInitialized = false;
                                    console.log('[final direct] nueva partida:', gid);
                                }
                            }

                            // Disparar checkMatchEnd si hay FinishedStartTime
                            const finished = Number(snap.FinishedStartTime || snap.allinfo?.FinishedStartTime || 0);
                            if (finished > 0 && snapshotInitialized && !finalSequenceStarted) {
                                console.log('[final direct] FinishedStartTime detectado:', finished);
                                CURRENT_SNAPSHOT = snap;
                                LAST_GOOD_SNAPSHOT = snap;
                                checkMatchEnd(snap);
                            }

                            if (!snapshotInitialized) snapshotInitialized = true;
                            return;
                        } catch (e) { /* ignorar */ }
                    }
                }
                setInterval(pollSnapshotDirect, 1000);
            }
        });

        // ======================================================
        // FIX CRÍTICO — SUSCRIPCIÓN A OverlayBus (OBLIGATORIO)
        // ======================================================
        (function initOverlayBusBindings() {
            if (!window.OverlayBus) {
                console.warn("[OVERLAY] OverlayBus no disponible");
                return;
            }

            const commands = [
                "showWinner",
                "showMVP",
                "showMVT",
                "showTablaPartida",
                "hideAll"
            ];

            commands.forEach(cmd => {
                OverlayBus.on(cmd, () => {
                    console.log("[OverlayBus] comando recibido:", cmd);
                    handleCommand(cmd);
                });
            });

            console.log("[OVERLAY] OverlayBus bindings inicializados");
        })();

        // ── Canal 2: OverlaySync (BroadcastChannel entre pestañas/Browser Sources)
        if (window.OverlaySync) {
            console.debug('[final_aniversario] OverlaySync disponible — escuchando BroadcastChannel "pubgm_overlay"');
        }

        // ===== INICIO INTEGRACIÓN SHEETS =====
        // Bug 1 fix: GAS_URL hardcodeada se autobloqueaba (comparaba consigo misma).
        // Ahora lee desde localStorage igual que stats_v5-1, configurable desde fuera.
        function getGasUrl() {
            return 'https://script.google.com/macros/s/AKfycbw-YM6A4IGPp60NfwIEd-xeOtj4FBgQ0P0RKU4K7yzyfWPhaq4P8loy-Ekwx1SS9yvw/exec';
        }

        // Control de envío único por partida
        let overlaySent = false;
        let lastGameIDForSheets = null;

        // --- Funciones de extracción de datos desde el DOM ---
        function getWWCD() {
            const winnerNameEl = document.getElementById('winnerName');
            const winnerLogoEl = document.getElementById('winnerLogo');
            if (!winnerNameEl || !winnerLogoEl) return [];
            const equipo = winnerNameEl.textContent.trim() || 'Desconocido';
            // Bug 2 fix: .src devuelve URL absoluta del archivo local (file://...)
            // que GAS no puede usar. Se extrae solo el nombre de archivo relativo.
            const srcFull = winnerLogoEl.src || '';
            const logo = srcFull.includes('assets/logos/')
                ? '../assets/logos/' + srcFull.split('assets/logos/').pop()
                : srcFull;
            return [[logo, equipo]];
        }

        function getMVP() {
            const nameEl  = document.getElementById('mvpName');
            const logoEl  = document.getElementById('mvpLogo');
            const killsEl = document.getElementById('mvpKills');
            const damageEl = document.getElementById('mvpDamage');
            if (!nameEl || !logoEl || !killsEl || !damageEl) return [];
            const jugador = nameEl.textContent.trim() || 'Desconocido';
            const srcFull = logoEl.src || '';
            const logo = srcFull.includes('assets/logos/')
                ? '../assets/logos/' + srcFull.split('assets/logos/').pop()
                : srcFull;
            // Bug 3 fix: kills y damage son strings del DOM — convertir a número
            const kills  = Number(killsEl.textContent.trim()) || 0;
            const damage = Number(damageEl.textContent.trim()) || 0;
            return [[logo, jugador, kills, damage]];
        }

        function getMVT() {
            const nameEl   = document.getElementById('mvtName');
            const logoEl   = document.getElementById('mvtLogo');
            const killsEl  = document.getElementById('mvtKills');
            const damageEl = document.getElementById('mvtDamage');
            if (!nameEl || !logoEl || !killsEl || !damageEl) return [];
            const equipo = nameEl.textContent.trim() || 'Desconocido';
            const srcFull = logoEl.src || '';
            const logo = srcFull.includes('assets/logos/')
                ? '../assets/logos/' + srcFull.split('assets/logos/').pop()
                : srcFull;
            const kills  = Number(killsEl.textContent.trim()) || 0;
            const damage = Number(damageEl.textContent.trim()) || 0;
            return [[logo, equipo, kills, damage]];
        }

        function getTDP() {
            const rows = document.querySelectorAll('#classificationBody1 tr, #classificationBody2 tr');
            const tdp = [];
            rows.forEach(row => {
                const cells = row.cells;
                if (cells.length < 6) return;
                const pos   = Number(cells[0]?.textContent.trim()) || 0;
                const logoImg = cells[1]?.querySelector('img');
                const srcFull = logoImg ? logoImg.src : '';
                const logo = srcFull.includes('assets/logos/')
                    ? '../assets/logos/' + srcFull.split('assets/logos/').pop()
                    : srcFull;
                const equipoDiv = cells[2]?.querySelector('.team-name');
                const equipo = equipoDiv ? equipoDiv.textContent.trim() : '';
                // Bug 3 fix: convertir pp, pe, total a número
                const pp    = Number(cells[3]?.textContent.trim()) || 0;
                const pe    = Number(cells[4]?.textContent.trim()) || 0;
                const total = Number(cells[5]?.textContent.trim()) || 0;
                tdp.push([pos, logo, equipo, pp, pe, total]);
            });
            return tdp;
        }

        // --- Función principal de envío ---
        async function sendOverlayToSheets() {
            if (overlaySent) {
                console.log("[SHEETS] Envío omitido (ya enviado para esta partida)");
                return;
            }

            // Bug 1 fix: usar URL desde localStorage, no constante hardcodeada
            const gasUrl = getGasUrl();
            if (!gasUrl) {
                console.warn("[SHEETS] webAppUrl no configurada en localStorage. Omitiendo envío.");
                return;
            }

            const wwcd = getWWCD();
            const mvp  = getMVP();
            const mvt  = getMVT();
            const tdp  = getTDP();

            if (tdp.length === 0) {
                console.warn("[SHEETS] Tabla de partida vacía, no se envía nada");
                return;
            }

            const payload = {
                type: "OVERLAY",
                WWCD: wwcd,
                MVP:  mvp,
                MVT:  mvt,
                TDP:  tdp
            };

            console.log("[SHEETS] Enviando OVERLAY:", JSON.stringify(payload).substring(0, 200));

            // Bug 4 fix: quitar mode:'no-cors' — con no-cors el body se ignora por
            // el navegador (opaque request) y GAS nunca recibe el JSON.
            // GAS maneja CORS automáticamente en Web Apps públicos.
            try {
                const response = await fetch(gasUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                overlaySent = true;
                console.log("[SHEETS] OVERLAY enviado correctamente:", result, "GameID:", lastGameIDForSheets);
            } catch (err) {
                console.error("[SHEETS] Error en el envío:", err);
                // overlaySent permanece false para permitir reintento
            }
        }

        // --- Resetear el flag cuando llega una nueva partida (nuevo GameID) ---
        // El reset de overlaySent y lastGameIDForSheets ahora se realiza directamente
        // dentro del listener principal de snapshotChannel (integrado en el HOTFIX CRÍTICO).
        // Este bloque se mantiene como referencia pero no sobreescribe el listener.

        // --- Sobrescribir showClassification de forma no invasiva para añadir el envío al final ---
        const originalShowClassification = showClassification;
        showClassification = function() {
            // Ejecutar la función original
            originalShowClassification();

            // Programar el envío a Sheets con un pequeño retraso para asegurar DOM completo
            setTimeout(() => {
                sendOverlayToSheets();
            }, 800);
        };

        // ===== FIN INTEGRACIÓN SHEETS =====
    </script>
</body>
</html>
