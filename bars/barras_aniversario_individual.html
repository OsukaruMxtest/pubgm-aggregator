            function initExternalControl() {
                // MODO FIJO INDIVIDUAL: no leemos ni aplicamos displayMode externo

                if (window.OverlayConfig) {
                    window.OverlayConfig.subscribe((cfg) => {
                        // Ignorar displayMode — CURRENT_MODE siempre "individual"
                        applyVisibility();
                        applyColumnVisibility();
                        scheduleRender();
                    });
                }
                if (window.OverlayBus) {
                    window.OverlayBus.on('hideAll', () => setVisible(false));
                    window.OverlayBus.on('set_display_mode', () => { /* ignorado */ });
                    window.OverlayBus.on('display_mode_individual', () => { /* ignorado, ya es individual */ });
                    window.OverlayBus.on('display_mode_team', () => { /* ignorado */ });
                    window.OverlayBus.on('col_pp_on',    () => { applyColumnVisibility(); scheduleRender(); });
                    window.OverlayBus.on('col_pp_off',   () => { applyColumnVisibility(); scheduleRender(); });
                    window.OverlayBus.on('col_total_on', () => { applyColumnVisibility(); scheduleRender(); });
                    window.OverlayBus.on('col_total_off',() => { applyColumnVisibility(); scheduleRender(); });
                }

                try {
                    const cmdChannel = new BroadcastChannel('pubgm_commands');
                    cmdChannel.onmessage = function(e) {
                        const data = e.data;
                        if (!data) return;
                        const cmd = data.cmd || data.command;
                        if (!cmd) return;
                        if (window.OverlayBus) {
                            window.OverlayBus.emit(cmd, { ...data, command: cmd });
                        }
                    };
                } catch(e) {}
                window.addEventListener('storage', (e) => {
                    if (e.key === 'overlay_manual_cmd' && e.newValue) {
                        try {
                            const payload = JSON.parse(e.newValue);
                            if (payload.command === 'hideAll') setVisible(false);
                            if (payload.command === 'show_overlay') setVisible(true);
                            // display_mode ignorado — modo fijo individual
                        } catch (err) {}
                    }

                    if (e.key === 'overlay_config_update' && e.newValue) {
                        try {
                            const upd = JSON.parse(e.newValue);
                            if (window.OverlayConfig) {
                                window.OverlayConfig.set({ [upd.category]: { [upd.key]: upd.value } });
                            }
                            if (upd.category === 'tables' && upd.key === 'teamBars') {
                                applyVisibility();
                                if (upd.value && CURRENT_SNAPSHOT && !renderScheduled) scheduleRender();
                            }
                            if (upd.category === 'columns') {
                                applyColumnVisibility();
                                if (CURRENT_SNAPSHOT && !renderScheduled) scheduleRender();
                            }
                        } catch (err) {}
                    }
                });
            }

            let lastOverlayCommandTimestamp = 0;
            let commandFetchInProgress = false;

            async function pollOverlayCommands() {
                if (commandFetchInProgress) return;
                commandFetchInProgress = true;

                try {
                    const url = `${COMMAND_ENDPOINT}/latest?since=${lastOverlayCommandTimestamp}`;
                    const response = await fetch(url, { cache: 'no-cache', signal: AbortSignal.timeout(1500) });
                    if (!response.ok) return;

                    const data = await response.json();
                    if (!data || !data.timestamp) return;
                    if (data.timestamp <= lastOverlayCommandTimestamp) return;

                    lastOverlayCommandTimestamp = data.timestamp;
                    const cmd = data.cmd || data.command;
                    if (cmd) handleOverlayCommand(cmd);
                    if (commandChannel?.postMessage) {
                        const rebroadcastPayload = { type: 'command', cmd, timestamp: data.timestamp };
                        if (cmd === 'set_display_mode') {
                            rebroadcastPayload.mode = CURRENT_MODE;
                            rebroadcastPayload.command = cmd;
                        }
                        commandChannel.postMessage(rebroadcastPayload);
                    }
                } catch (e) {
                    logError('Error en comando overlay:', e);
                } finally {
                    commandFetchInProgress = false;
                }
            }

            let reloadGuard = false;
            function handleOverlayCommand(cmd) {
                switch (cmd) {
                    case 'reset_overlay':
                        if (reloadGuard) return;
                        reloadGuard = true;
                        location.reload();
                        break;
                    case 'hide_overlay':
                        if (window.OverlayConfig) {
                            window.OverlayConfig.set({ tables: { teamBars: false } });
                        }
                        setVisible(false);
                        break;
                    case 'show_overlay':
                        if (window.OverlayConfig) {
                            window.OverlayConfig.set({ tables: { teamBars: true } });
                        }
                        setVisible(true);
                        break;
                    case 'reset_state':
                        currentState = OverlayState.TABLE;
                        isTransitioning = false;
                        isAnimating = false;
                        isPanelAnimating = false;
                        pendingQueue = [];
                        scheduleRender();
                        break;
                    case 'show_match_table':
                        currentState = OverlayState.TABLE;
                        scheduleRender();
                        break;
                    case 'display_mode_individual':
                        // ignorado — modo fijo individual
                        break;
                    case 'display_mode_team':
                        // ignorado — modo fijo individual
                        break;
                    case 'set_display_mode':
                        break;
                    default:
                        break;
                }
            }

            function getSnapshotKey(snapshot) {
                if (!snapshot) return null;
                let time = snapshot.CurrentTime || snapshot.allinfo?.CurrentTime || 0;
                let playerCount = 0;
                let teamCount = 0;
                let totalKills = 0;
                if (snapshot.allinfo) {
                    if (Array.isArray(snapshot.allinfo.TotalPlayerList)) {
                        playerCount = snapshot.allinfo.TotalPlayerList.length;
                        totalKills = snapshot.allinfo.TotalPlayerList.reduce((acc, p) => acc + (p.killNum || 0), 0);
                    }
                    if (Array.isArray(snapshot.allinfo.TeamInfoList)) {
                        teamCount = snapshot.allinfo.TeamInfoList.length;
                    }
                }
                return `t_${time}_p${playerCount}_k${totalKills}_team${teamCount}`;
            }

            async function fetchSnapshotWithFailover() {
                let attempts = 0;
                const maxAttempts = OBSERVER_ENDPOINTS.length;

                while (attempts < maxAttempts) {
                    const endpoint = OBSERVER_ENDPOINTS[CURRENT_OBSERVER_INDEX];
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 1500);
                        const response = await fetch(endpoint, { signal: controller.signal });
                        clearTimeout(timeoutId);

                        if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                        const snapshot = await response.json();

                        if (!snapshot || !snapshot.allinfo || 
                            !Array.isArray(snapshot.allinfo.TotalPlayerList) || 
                            !Array.isArray(snapshot.allinfo.TeamInfoList)) {
                            throw new Error('Invalid snapshot format');
                        }

                        LAST_GOOD_SNAPSHOT = snapshot;
                        if (CURRENT_OBSERVER_INDEX !== lastLoggedObserverIndex) {
                            lastLoggedObserverIndex = CURRENT_OBSERVER_INDEX;
                        }
                        return snapshot;
                    } catch (error) {
                        logError(`Fallo en endpoint ${CURRENT_OBSERVER_INDEX}: ${error.message}`);
                        CURRENT_OBSERVER_INDEX = (CURRENT_OBSERVER_INDEX + 1) % OBSERVER_ENDPOINTS.length;
                        attempts++;
                    }
                }

                if (LAST_GOOD_SNAPSHOT) {
                    if (lastLoggedObserverIndex !== -2) {
                        console.warn('[Observer] Todos los endpoints fallaron, usando último snapshot válido');
                        lastLoggedObserverIndex = -2;
                    }
                    return LAST_GOOD_SNAPSHOT;
                }
                return null;
            }

            function logError(message, ...args) {
                const now = Date.now();
                if (now - lastErrorLogTime > ERROR_THROTTLE_MS) {
                    console.error(message, ...args);
                    lastErrorLogTime = now;
                }
            }

            async function updateSnapshotLoop() {
                if (FETCH_IN_PROGRESS) return;
                FETCH_IN_PROGRESS = true;
                try {
                    const snapshot = await fetchSnapshotWithFailover();
                    if (snapshot) {
                        const newKey = getSnapshotKey(snapshot);
                        CURRENT_SNAPSHOT = snapshot;
                        if (!externalVisible) {
                            lastHiddenSnapshot = snapshot;
                        }

                        if (snapshotChannel?.postMessage && newKey !== LAST_BROADCAST_KEY) {
                            LAST_BROADCAST_KEY = newKey;
                            snapshotChannel.postMessage({
                                type: 'snapshot',
                                data: snapshot,
                                timestamp: Date.now()
                            });
                        }

                        scheduleRender();
                    }
                } catch (e) {
                    logError('Error en snapshot loop:', e);
                } finally {
                    FETCH_IN_PROGRESS = false;
                }
            }

            function generateMockSnapshot() {
                const baseRanks = [1, 2, 3, 4];
                const ranks = [...baseRanks].sort(() => Math.random() - 0.5);
                
                const teams = [
                    { teamId: 101, teamName: 'Alpha', baseKills: 8, color: '#FF4444' },
                    { teamId: 102, teamName: 'Bravo', baseKills: 6, color: '#44FF44' },
                    { teamId: 103, teamName: 'Charlie', baseKills: 4, color: '#4444FF' },
                    { teamId: 104, teamName: 'Delta', baseKills: 2, color: '#FFFF44' }
                ];

                const TotalPlayerList = [];
                const TeamInfoList = [];

                teams.forEach((team, idx) => {
                    const rankForTeam = ranks[idx]; 
                    const liveCount = Math.max(1, 4 - (rankForTeam - 1)); 
                    const teamKills = team.baseKills + Math.floor(Math.random() * 3);
                    TeamInfoList.push({
                        teamId: team.teamId,
                        teamName: team.teamName,
                        killNum: teamKills,
                        liveMemberNum: liveCount,
                        color: team.color
                    });

                    for (let i = 1; i <= 4; i++) {
                        const health = i <= liveCount ? 100 - (i * 20) + Math.floor(Math.random() * 10) : 0;
                        const liveState = i <= liveCount ? (i === 1 ? 4 : 1) : 5;
                        TotalPlayerList.push({
                            playerId: team.teamId * 10 + i,
                            teamId: team.teamId,
                            playerName: `Player${i}`,
                            health: health,
                            healthMax: 100,
                            liveState: liveState,
                            rank: rankForTeam,
                            killNum: i === 1 ? teamKills : 0,
                            isOutsideBlueCircle: i === 2 ? true : false,
                            teamName: team.teamName
                        });
                    }
                });

                const TeamBackPackList = [];
                teams.forEach(team => {
                    TeamBackPackList.push({
                        TeamID: team.teamId,
                        "602001": "Num:2",
                        "602002": "Num:1",
                        "602003": "Num:1",
                        "602004": "Num:3"
                    });
                });

                return {
                    allinfo: {
                        TotalPlayerList,
                        TeamInfoList,
                        CurrentTime: Date.now()
                    },
                    teambackpackinfo: {
                        TeamBackPackList
                    }
                };
            }

            let debugInterval = null;
            function startDebugMode() {
                console.log('[DEBUG] Modo debug activado - generando snapshot mock cada 1000ms');
                if (debugInterval) clearInterval(debugInterval);
                
                const emitMock = () => {
                    const mock = generateMockSnapshot();
                    CURRENT_SNAPSHOT = mock;
                    if (!externalVisible) {
                        lastHiddenSnapshot = mock;
                    }
                    if (window.OverlayBroadcast?.broadcastSnapshot) {
                        window.OverlayBroadcast.broadcastSnapshot(mock);
                    } else if (snapshotChannel?.postMessage) {
                        snapshotChannel.postMessage({
                            type: 'snapshot',
                            data: mock,
                            timestamp: Date.now()
                        });
                    }
                    scheduleRender();
                };

                emitMock();
                debugInterval = setInterval(emitMock, 1000);
            }

            function scheduleRender() {
                if (renderScheduled) return;
                renderScheduled = true;
                requestAnimationFrame(() => {
                    renderScheduled = false;
                    fetchData().catch(err => logError('Error en fetchData:', err));
                });
            }

            function updateHealthBars(container, playerArray) {
                const calcColor = perc => {
                    if (perc <= 20) return 'rgb(255,131,0)';
                    const r = Math.round(33 + (255 - 33) * ((100 - perc) / 80));
                    const g = Math.round(255 + (131 - 255) * ((100 - perc) / 80));
                    const b = Math.round(2 + (0 - 2) * ((100 - perc) / 80));
                    return `rgb(${r},${g},${b})`;
                };
                container.innerHTML = '';
                playerArray.forEach(player => {
                    const bar = document.createElement('div');
                    bar.className = 'health-bar';
                    const healthMax = Math.max(player.healthMax || 100, 1);
                    const perc = (player.health / healthMax) * 100;
                    const cls = player.liveState === 5 ? 'eliminated' :
                                player.liveState === 6 ? 'disconnected' :
                                player.liveState === 4 ? 'danger' : '';
                    const borderCls = player.isOutsideBlueCircle && player.liveState !== 5 ? 'outside-blue' : '';
                    if (cls) bar.classList.add(cls);
                    if (borderCls) bar.classList.add(borderCls);
                    const fill = document.createElement('div');
                    fill.className = 'health-fill';
                    fill.style.height = player.liveState === 5 ? '0%' : `${perc}%`;
                    fill.style.backgroundColor = player.liveState === 5 ? 'black' : calcColor(perc);
                    bar.appendChild(fill);
                    container.appendChild(bar);
                });
            }

            function animateReorder(tableBody, orderedTeamIds) {
                if (lastOrderedTeamIds.length === orderedTeamIds.length) {
                    let same = true;
                    for (let i = 0; i < orderedTeamIds.length; i++) {
                        if (lastOrderedTeamIds[i] !== orderedTeamIds[i]) {
                            same = false;
                            break;
                        }
                    }
                    if (same) return;
                }
                lastOrderedTeamIds = [...orderedTeamIds];

                const rows = Array.from(tableBody.children);
                const firstPositions = new Map();
                rows.forEach(row => {
                    if (row.dataset.teamId) {
                        firstPositions.set(row.dataset.teamId, row.getBoundingClientRect().top);
                    }
                });
                orderedTeamIds.forEach(id => {
                    const row = tableBody.querySelector(`.t-row[data-team-id="${id}"]`);
                    if (row) tableBody.appendChild(row);
                });
                requestAnimationFrame(() => {
                    rows.forEach(row => {
                        if (row.dataset.teamId) {
                            const lastTop = row.getBoundingClientRect().top;
                            const firstTop = firstPositions.get(row.dataset.teamId);
                            if (firstTop !== undefined) {
                                const deltaY = firstTop - lastTop;
                                row.style.transform = `translateY(${deltaY}px)`;
                                row.style.transition = 'none';
                            }
                        }
                    });
                    requestAnimationFrame(() => {
                        rows.forEach(row => {
                            if (row.dataset.teamId) {
                                row.style.transition = 'transform 0.6s ease';
                                row.style.transform = 'translateY(0)';
                            }
                        });
                    });
                });
            }

            function paginatePlayers(players) {
                const panels = [];
                for (let i = 0; i < players.length; i += 16) {
                    panels.push(players.slice(i, i + 16));
                }
                return panels;
            }

            let pendingPanelEntrance = false;

            function triggerPanelTransition(nextIndex) {
                if (isPanelAnimating) return;
                isPanelAnimating = true;

                const tableBody = document.getElementById('tableBody');
                const bodyRows = tableBody ? Array.from(tableBody.querySelectorAll('.t-row')) : [];

                if (bodyRows.length === 0) {
                    currentPanelIndex = nextIndex;
                    isPanelAnimating = false;
                    pendingPanelEntrance = true;
                    if (!renderScheduled) scheduleRender();
                    return;
                }

                let done = 0;
                bodyRows.forEach((row, i) => {
                    setTimeout(() => {
                        row.classList.remove('row-slide-in');
                        row.style.opacity = '1';
                        row.style.transform = 'none';
                        row.classList.add('row-slide-out');
                        const onAnimEnd = () => {
                            row.classList.remove('row-slide-out');
                            row.style.opacity = '0';
                            if (++done === bodyRows.length) {
                                tableBody.innerHTML = '';
                                currentPanelIndex = nextIndex;
                                isPanelAnimating = false;
                                pendingPanelEntrance = true;
                                if (!renderScheduled) scheduleRender();
                                if (pendingQueue.length > 0) {
                                    const next = pendingQueue.shift();
                                    processData(next.data, next.backpackData);
                                }
                            }
                        };
                        row.addEventListener('animationend', onAnimEnd, { once: true });
                        setTimeout(() => {
                            if (done < bodyRows.length) onAnimEnd();
                        }, 500);
                    }, i * 45);
                });
            }

            async function renderTable(teams) {
                const headerLabel = document.querySelector('#tableHeader .t-equipo');
                if (headerLabel) {
                    headerLabel.textContent = '\u00a0\u00a0\u00a0JUGADOR';
                }
                const currentGameID = CURRENT_SNAPSHOT?.GameID || CURRENT_SNAPSHOT?.allinfo?.GameID || null;
                if (currentGameID && currentGameID !== lastRenderedGameID) {
                    const tableBody = document.getElementById('tableBody');
                    if (tableBody) tableBody.innerHTML = '';
                    const finalContainer = document.getElementById('finalPlayersContainer');
                    if (finalContainer) finalContainer.innerHTML = '';
                    currentState = OverlayState.TABLE;
                    _prevTableVisible = null;
                    lastRenderedGameID = currentGameID;
                    currentPanelIndex = 0;
                    panelStartTime = 0;
                    lastPanelSize = 0;
                }
                const mainOverlay = document.getElementById('mainOverlay');
                const aliveCount = teams.filter(t => t.liveMemberNum > 0).length;
                if (aliveCount > 3) {
                    mainOverlay.classList.add('large-table-bg');
                } else {
                    mainOverlay.classList.remove('large-table-bg');
                }

                mainOverlay.classList.remove('overlay-fade-out', 'slide-out-right');
                const tableBody = document.getElementById('tableBody');
                tableBody.querySelectorAll('.t-row').forEach(row => {
                    row.classList.remove('table-row-exit', 'table-col-exit');
                    row.style.opacity = '1';
                    row.style.transform = '';
                });

                const topTeams = teams.slice(0, 16);
                const orderedTeamIds = topTeams.map(t => String(t.teamId));
                const orderedSet = new Set(orderedTeamIds);
                const offset = currentPanelIndex * 16;

                topTeams.forEach((team, index) => {
                    const id = String(team.teamId);
                    let row = tableBody.querySelector(`.t-row[data-team-id="${id}"]`);
                    if (!row) {
                        row = document.createElement('div');
                        row.className = 't-row';
                        row.dataset.teamId = id;
                        row.innerHTML = `
                            <div class="t-cell t-pos"></div>
                            <div class="t-cell t-equipo t-name"></div>
                            <div class="t-cell t-health"><div class="health-bar-container"></div></div>
                            <div class="t-cell t-elim"></div>
                        `;
                        tableBody.appendChild(row);
                    }
                    row.querySelector('.t-pos').textContent = offset + index + 1;
                    row.querySelector('.t-name').textContent = getTeamDisplayName(team) || 'Desconocido';
                    row.querySelector('.t-elim').textContent = team.killNum ?? 0;

                    const healthContainer = row.querySelector('.health-bar-container');
                    updateHealthBars(healthContainer, team.players);
                    row.classList.toggle('eliminado', team.liveMemberNum === 0);
                });

                tableBody.querySelectorAll('.t-row').forEach(row => {
                    const id = row.dataset.teamId;
                    if (id && !orderedSet.has(id)) {
                        row.remove();
                    }
                });

                animateReorder(tableBody, orderedTeamIds);
                applyColumnVisibility();
            }

            function applyColumnVisibility() {
                // Grid fijo: POS | NOMBRE | BARRAS | ELIM
                const gridVal = '40px 1fr 70px 45px';
                document.querySelectorAll('.t-row').forEach(row => {
                    row.style.gridTemplateColumns = gridVal;
                });
            }

            function rebuildPlayersFromSnapshot(allinfo) {
                const players = [];
                if (!allinfo || !Array.isArray(allinfo.TotalPlayerList)) return players;
                allinfo.TotalPlayerList.forEach(p => {
                    const player = {
                        playerId: p.playerId,
                        uId: p.uId,
                        teamId: p.teamId,
                        playerName: p.playerName,
                        health: p.health || 0,
                        healthMax: p.healthMax || 100,
                        liveState: p.liveState || 0,
                        rank: p.rank || 0,
                        killNum: p.killNum || 0,
                        isOutsideBlueCircle: p.isOutsideBlueCircle || false,
                        teamName: p.teamName || '',
                        killNumByGrenade: Number(p.killNumByGrenade ?? 0),
                        killNumInVehicle: Number(p.killNumInVehicle ?? 0),
                        maxKillDistance:  Number(p.maxKillDistance  ?? 0)
                    };
                    players.push(player);
                });
                return players;
            }

            async function renderPipeline(data, backpackData) {
                if (!data?.allinfo?.TotalPlayerList?.length) return;
                const cfg = window.OverlayConfig?.get?.() || {};
                const scoringCfg = cfg?.scoring || {};
                const killPoints = Number(scoringCfg.pePerKill ?? scoringCfg.killPoints ?? 1);
                const positionPointsTable = scoringCfg.pp || scoringCfg.positionPoints || rankToPPP;
                const bonusEnabled = scoringCfg.bonusEnabled ?? false;
                const bonusCfg = scoringCfg.bonus || {};
                const showPP    = cfg?.columns?.showPP    ?? true;
                const showTotal = cfg?.columns?.showTotal ?? true;

                let players;
                if (window.OverlaySync?.rebuildPlayersFromSnapshot) {
                    players = window.OverlaySync.rebuildPlayersFromSnapshot(data.allinfo);
                    const rawByUid = new Map();
                    (data.allinfo?.TotalPlayerList || []).forEach(p => {
                        rawByUid.set(String(p.uId ?? p.playerId ?? ''), p);
                    });
                    players.forEach(p => {
                        const raw = rawByUid.get(String(p.uId ?? p.playerId ?? ''));
                        if (!raw) return;
                        if (p.killNumByGrenade === undefined) p.killNumByGrenade = Number(raw.killNumByGrenade ?? 0);
                        if (p.killNumInVehicle === undefined) p.killNumInVehicle = Number(raw.killNumInVehicle ?? 0);
                        if (p.maxKillDistance  === undefined) p.maxKillDistance  = Number(raw.maxKillDistance  ?? 0);
                    });
                } else {
                    players = rebuildPlayersFromSnapshot(data.allinfo);
                }
                const teamsInfo = data.allinfo?.TeamInfoList || [];

                const teamsMap = new Map();
                teamsInfo.forEach(ti => {
                    teamsMap.set(ti.teamId, {
                        teamId: ti.teamId,
                        teamName: ti.teamName,
                        killNum: ti.killNum,
                        liveMemberNum: ti.liveMemberNum,
                        players: []
                    });
                });
                players.forEach(p => {
                    if (teamsMap.has(p.teamId)) {
                        teamsMap.get(p.teamId).players.push(p);
                    } else {
                        teamsMap.set(p.teamId, {
                            teamId: p.teamId,
                            teamName: p.teamName || `Team ${p.teamId}`,
                            killNum: p.killNum || 0,
                            liveMemberNum: (p.liveState !== 5 && p.liveState !== 6) ? 1 : 0,
                            players: [p]
                        });
                    }
                });

                const utilityMap = backpackData.utilitiesByTeam || new Map();

                const ITEM_TYPES = { MOLOTOV: '602003' };

                let globalMaxDistance = 0;
                let teamWithLongestKill = null;
                Array.from(teamsMap.values()).forEach(team => {
                    team.players.forEach(p => {
                        const dist = Number(p.maxKillDistance ?? 0);
                        if (dist > globalMaxDistance) {
                            globalMaxDistance = dist;
                            teamWithLongestKill = team.teamId;
                        }
                    });
                });

                const killinfoAll = (typeof CURRENT_SNAPSHOT !== 'undefined' && CURRENT_SNAPSHOT?.killinfo) || [];
                const molotovByTeam = new Map();
                killinfoAll.forEach(k => {
                    if (String(k.ResultHealthStatus) !== "2") return;
                    if (String(k.ItemID) !== ITEM_TYPES.MOLOTOV) return;
                    const causerUid = String(k.CauserUID ?? k.causerId ?? '');
                    if (!causerUid) return;
                    let causerTeamId = null;
                    teamsMap.forEach((team, tid) => {
                        if (causerTeamId) return;
                        const found = team.players.find(p =>
                            String(p.uId ?? p.playerId ?? '') === causerUid
                        );
                        if (found) causerTeamId = tid;
                    });
                    if (causerTeamId === null) return;
                    molotovByTeam.set(causerTeamId, (molotovByTeam.get(causerTeamId) || 0) + 1);
                });

                let teams = Array.from(teamsMap.values()).map(team => {
                    const teamRank = team.players.length > 0 ? (team.players[0].rank || null) : null;
                    const ppp = teamRank ? (positionPointsTable[teamRank] || 0) : 0;
                    const utilities = utilityMap.get(team.teamId) || { frag:0, smoke:0, molotov:0, flash:0 };

                    let grenadeKills = 0, vehicleKills = 0;
                    team.players.forEach(p => {
                        grenadeKills += Number(p.killNumByGrenade ?? 0);
                        vehicleKills += Number(p.killNumInVehicle ?? 0);
                    });
                    const molotovKills = molotovByTeam.get(team.teamId) || 0;
                    const meleeKills   = 0;

                    const hasLongestKill     = team.teamId === teamWithLongestKill && globalMaxDistance > 0;
                    const hasLongestDistance = hasLongestKill;

                    const pe = (team.killNum || 0) * killPoints;
                    let bonusPoints = 0;
                    if (bonusEnabled) {
                        bonusPoints += grenadeKills * (bonusCfg.grenade ?? bonusCfg.grenadePerKill ?? 0);
                        bonusPoints += vehicleKills * (bonusCfg.vehicle ?? bonusCfg.vehiclePerKill ?? 0);
                        bonusPoints += meleeKills   * (bonusCfg.melee   ?? bonusCfg.meleePerKill   ?? 0);
                        bonusPoints += molotovKills * (bonusCfg.molotov ?? bonusCfg.molotovPerKill ?? 0);
                        if (hasLongestDistance) bonusPoints += (bonusCfg.distance ?? bonusCfg.longestDistance ?? 0);
                        if (hasLongestKill)     bonusPoints += (bonusCfg.killDist ?? bonusCfg.longestKill    ?? 0);
                    }
                    const bonus = bonusPoints;
                    const total = pe + ppp + bonusPoints;

                    return { ...team, teamRank, ppp, pe, bonus, total, utilities,
                             grenadeKills, vehicleKills, meleeKills, molotovKills,
                             hasLongestKill, hasLongestDistance };
                });

                teams = teams.filter(t => t.players.length > 0);

                if (CURRENT_MODE === "individual") {
                    let playersFlat = [];
                    teams.forEach(team => {
                        team.players.forEach(p => {
                            const ppp = positionPointsTable[p.rank] || 0;
                            const peInd = (p.killNum || 0) * killPoints;
                            const bonusPointsInd = bonusEnabled ? (p.bonus || 0) : 0;
                            const total = ppp + peInd + bonusPointsInd;
                            const uniqueId = p.uId || p.playerId || (p.teamId + "_" + p.playerName);
                            playersFlat.push({
                                teamId: `p_${uniqueId}`,
                                originalTeamId: p.teamId,
                                teamName: p.teamName || ("TEAM " + p.teamId),
                                playerName: p.playerName,
                                killNum: p.killNum || 0,
                                rank: p.rank || 999,
                                teamRank: p.rank || 999,
                                ppp,
                                pe: peInd,
                                bonus: 0,
                                total,
                                players: [p],
                                liveMemberNum: (p.liveState !== 5 && p.liveState !== 6) ? 1 : 0,
                                utilities: { frag: 0, smoke: 0, molotov: 0, flash: 0 }
                            });
                        });
                    });
                    playersFlat.sort((a, b) => {
                        // 1. Mayor número de eliminaciones
                        if (b.killNum !== a.killNum) return b.killNum - a.killNum;
                        // 2. Empate en kills → vivos primero
                        const aAlive = a.liveMemberNum > 0 ? 1 : 0;
                        const bAlive = b.liveMemberNum > 0 ? 1 : 0;
                        return bAlive - aAlive;
                    });
                    teams = playersFlat;
                } else {
                    teams.sort((a, b) => {
                        if (showTotal) {
                            if (b.total !== a.total) return b.total - a.total;
                        } else {
                            if (b.killNum !== a.killNum) return b.killNum - a.killNum;
                        }
                        if (showPP && b.ppp !== a.ppp) return b.ppp - a.ppp;
                        if (b.killNum !== a.killNum) return b.killNum - a.killNum;
                        const aAlive = a.liveMemberNum > 0 ? 1 : 0;
                        const bAlive = b.liveMemberNum > 0 ? 1 : 0;
                        if (bAlive !== aAlive) return bAlive - aAlive;
                        const aRank = a.teamRank ?? 0;
                        const bRank = b.teamRank ?? 0;
                        if (aRank !== bRank) return aRank - bRank;
                        return 0;
                    });
                }

                // Calcular aliveTeams del total ANTES de paginar
                let aliveTeams = teams.filter(t => t.liveMemberNum > 0);
                const aliveCount = aliveTeams.length;
                lastAliveCount = aliveCount;

                if (aliveCount === 0) {
                    currentState = OverlayState.TABLE;
                    isTransitioning = false;
                    return;
                }

                // Ocultar cuando queda 1 o ningún jugador vivo
                const hasWinner = aliveCount <= 1;

                let earlyExit = false;
                if (hasWinner) {
                    const finalContainer = document.getElementById('finalPlayersContainer');
                    finalContainer.style.visibility = 'hidden';
                    finalContainer.style.opacity = '0';

                    if (_prevTableVisible !== false) {
                        animateTableHide();
                        _prevTableVisible = false;
                    }

                    currentState = OverlayState.HIDDEN;
                    earlyExit = true;
                }
                if (earlyExit) {
                    applyVisibility();
                    return;
                }

                if (currentState === OverlayState.HIDDEN && !hasWinner && aliveCount > 1) {
                    currentState = OverlayState.TABLE;
                    _prevTableVisible = null;
                }

                // Determinar siguiente estado: FINAL cuando quedan ≤3 vivos
                let nextState;
                if (aliveCount > 3) {
                    nextState = OverlayState.TABLE;
                } else {
                    const tableWasVisible = _prevTableVisible === true;
                    if (currentState === OverlayState.TABLE && tableWasVisible) {
                        nextState = OverlayState.TRANSITION_TO_FINAL;
                    } else {
                        nextState = OverlayState.FINAL;
                    }
                }
                const targetState = nextState;

                // Paginación: solo aplica cuando estamos en TABLE
                if (targetState === OverlayState.TABLE && CURRENT_MODE === "individual") {
                    const panels = paginatePlayers(teams);
                    const panelCount = panels.length;
                    if (panelCount > 0) {
                        // Reiniciar temporizador si cambió la cantidad total de elementos
                        if (teams.length !== lastPanelSize) {
                            panelStartTime = Date.now();
                            lastPanelSize = teams.length;
                        }
                        if (!panelStartTime) panelStartTime = Date.now();
                        let panelDuration = panelCount >= 3 ? 10000 : 15000;
                        const now = Date.now();
                        if (now - panelStartTime >= panelDuration) {
                            panelStartTime = now;
                            const nextIndex = (currentPanelIndex + 1) % panelCount;
                            triggerPanelTransition(nextIndex);
                            return;
                        }
                        teams = panels[currentPanelIndex] || panels[0];
                    } else {
                        teams = [];
                    }
                }

                const autoShowFor3 = aliveCount <= 3 && aliveCount > 0 && !hasWinner;
                if (!externalVisible && !autoShowFor3) {
                    applyVisibility();
                    currentState = targetState;
                    return;
                }
                if (autoShowFor3 && !externalVisible) {
                    externalVisible = true;
                    if (window.OverlayConfig) {
                        window.OverlayConfig.set({ tables: { teamBars: true } });
                    }
                }

                switch (targetState) {
                    case OverlayState.TABLE:
                        await renderTable(teams);
                        break;
                    case OverlayState.TRANSITION_TO_FINAL: {
                        const SAFE_LIMIT = 4;
                        aliveTeams = aliveTeams.slice(0, SAFE_LIMIT);
                        await animateTableToFinalTransition(aliveTeams);
                        break;
                    }
                    case OverlayState.FINAL: {
                        const SAFE_LIMIT = 4;
                        aliveTeams = aliveTeams.slice(0, SAFE_LIMIT);
                        await renderFinal(aliveTeams);
                        break;
                    }
                    case OverlayState.HIDDEN:
                        break;
                }
                currentState = targetState;
                applyVisibility();
            }

            async function processData(data, backpackData) {
                if (isAnimating || isPanelAnimating || isTransitioning) {
                    if (pendingQueue.length >= MAX_QUEUE) {
                        pendingQueue.shift();
                    }
                    pendingQueue.push({ data, backpackData });
                    return;
                }
                if (!data?.allinfo?.TotalPlayerList?.length) return;

                isTransitioning = true;
                try {
                    await renderPipeline(data, backpackData);
                } finally {
                    // Esperar dos frames para que el DOM y las animaciones se estabilicen
                    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                    isTransitioning = false;
                    if (pendingQueue.length > 0) {
                        const next = pendingQueue.shift();
                        setTimeout(() => processData(next.data, next.backpackData), 0);
                    }
                }
            }

            async function fetchData() {
                if (!CURRENT_SNAPSHOT && LAST_GOOD_SNAPSHOT) {
                    CURRENT_SNAPSHOT = LAST_GOOD_SNAPSHOT;
                }
                if (!CURRENT_SNAPSHOT) {
                    console.warn('[barras] No snapshot disponible, abortando fetchData');
                    return;
                }
                try {
                    const data = { allinfo: CURRENT_SNAPSHOT.allinfo };
                    let backpackData = { utilitiesByTeam: new Map() };

                    if (CURRENT_SNAPSHOT.teambackpackinfo) {
                        let teamBackPackList = null;
                        if (Array.isArray(CURRENT_SNAPSHOT.teambackpackinfo.TeamBackPackList)) {
                            teamBackPackList = CURRENT_SNAPSHOT.teambackpackinfo.TeamBackPackList;
                        } else if (Array.isArray(CURRENT_SNAPSHOT.teambackpackinfo.TeamBackpackInfoList)) {
                            teamBackPackList = CURRENT_SNAPSHOT.teambackpackinfo.TeamBackpackInfoList;
                        }

                        if (teamBackPackList) {
                            const teamUtils = new Map();
                            teamBackPackList.forEach(player => {
                                const teamId = player.TeamID;
                                if (!teamId) return;
                                if (!teamUtils.has(teamId)) {
                                    teamUtils.set(teamId, { frag:0, smoke:0, molotov:0, flash:0 });
                                }
                                const util = teamUtils.get(teamId);
                                Object.keys(player).forEach(key => {
                                    const itemId = parseInt(key);
                                    if (isNaN(itemId)) return;
                                    if (itemId !== 602001 && itemId !== 602002 && itemId !== 602003 && itemId !== 602004) return;
                                    const valueStr = player[key];
                                    if (typeof valueStr !== 'string') return;
                                    const match = valueStr.match(/Num:(\d+)/);
                                    if (match) {
                                        const count = parseInt(match[1], 10);
                                        if (!isNaN(count)) {
                                            if (itemId === 602004) util.frag += count;
                                            else if (itemId === 602002) util.smoke += count;
                                            else if (itemId === 602003) util.molotov += count;
                                            else if (itemId === 602001) util.flash += count;
                                        }
                                    }
                                });
                            });
                            backpackData.utilitiesByTeam = teamUtils;
                        }
                    }

                    await processData(data, backpackData);
                } catch (error) {
                    logError('Error en fetchData:', error);
                }
            }

            if (window.IS_SNAPSHOT_LEADER) {
                if (DEBUG) {
                    startDebugMode();
                } else {
                    if (!window.__snapshotLoopStarted) {
                        window.__snapshotLoopStarted = true;
                        const sleep = ms => new Promise(r => setTimeout(r, ms));
                        (async function snapshotLoop() {
                            while (true) {
                                await updateSnapshotLoop();
                                await sleep(1000);
                            }
                        })();
                    }
                }
            } else {
                console.log('[barras_aniversario] IS_SNAPSHOT_LEADER=false — escuchando BroadcastChannel');
            }

            if (!window.__overlayCommandPollingStarted) {
                window.__overlayCommandPollingStarted = true;
                setInterval(pollOverlayCommands, 1000);
            }

            initExternalControl();

            (function initColumnDefaults() {
                if (!window.OverlayConfig) return;
                const cur = window.OverlayConfig.get();
                if (!cur.columns || cur.columns.showPP === undefined || cur.columns.showTotal === undefined) {
                    window.OverlayConfig.set({ columns: { showPP: true, showTotal: true } });
                }
                applyColumnVisibility();
            })();

            if (!window.__autoFixIntervalStarted) {
                window.__autoFixIntervalStarted = true;
                setInterval(() => {
                    if (currentState === OverlayState.HIDDEN) return;
                    const cfg = window.OverlayConfig?.get();
                    const barsEnabled = cfg?.tables?.teamBars ?? true;
                    if (!barsEnabled) return;
                    if (externalVisible === false) {
                        externalVisible = true;
                        applyVisibility();
                    }
                }, 3000);
            }

            applyVisibility();
        })();

        function aplicarVisibilidadArrojables() {
            const contenedores = document.querySelectorAll('.arrojables-container');
            if (!contenedores.length) return;

            const estado = localStorage.getItem("overlay.mostrarArrojables") ?? "true";
            const mostrar = estado === "true";

            contenedores.forEach(cont => {
                cont.style.display = mostrar ? "" : "none";
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            aplicarVisibilidadArrojables();
        });

        window.addEventListener("storage", (event) => {
            if (event.key === "overlay.mostrarArrojables") {
                aplicarVisibilidadArrojables();
            }
        });
    </script>
</body>
